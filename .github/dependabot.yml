version: 2

# Dependency + Actions updates for the pnpm monorepo. Grouped so a wave of bumps arrives as one PR
# per ecosystem (not dozens), weekly, capped — and CI (ci.yml) gates every one of them before merge.
updates:
  - package-ecosystem: npm # covers the whole pnpm workspace from the root lockfile
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      production:
        dependency-type: production
        update-types: [minor, patch]
      development:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
