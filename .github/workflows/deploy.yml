name: Deploy (Vercel)

# Manual production deploy of both projects, in the required order: sponsor FIRST (so the new
# /events allowlist + /send-link result-XDR fix are live before the web references them), then web,
# then a live-claim smoke check.
#
# REQUIRES one repo secret: VERCEL_TOKEN  (create at https://vercel.com/account/tokens, then:
#   gh secret set VERCEL_TOKEN --repo mericcintosun/lumenia).
# The org + project ids below are not secret (team + project identifiers). USDC_ISSUER_SECRET is
# optional — set it as a secret to run the post-deploy live-claim regression; without it that step
# is skipped.
#
# Trigger it from the Actions tab (Run workflow) or: gh workflow run deploy.yml.

on:
  workflow_dispatch:
    inputs:
      run_claim_regression:
        description: "Run the live-claim regression after deploy (needs USDC_ISSUER_SECRET secret)"
        type: boolean
        default: false

env:
  VERCEL_ORG_ID: team_YQ5WK4Onim7LNOVsBBq7yTF2

jobs:
  deploy-sponsor:
    name: Deploy sponsor
    runs-on: ubuntu-latest
    env:
      VERCEL_PROJECT_ID: prj_JXTrIRAe7Vv7cdVMjryKgoyW8FeX
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Deploy to production
        run: vercel deploy --prod --yes --cwd apps/sponsor --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Smoke test /health
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://lumenia-sponsor.vercel.app/health)
            echo "attempt $i → $code"
            [ "$code" = "200" ] && exit 0
            sleep 5
          done
          echo "sponsor /health did not return 200"; exit 1

  deploy-web:
    name: Deploy web
    runs-on: ubuntu-latest
    needs: deploy-sponsor
    env:
      VERCEL_PROJECT_ID: prj_W6vSq4LmY47hy870T8M1mvZKTCJj
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Deploy to production
        run: vercel deploy --prod --yes --cwd apps/web --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Smoke test key routes
        run: |
          base=https://lumenia-chi.vercel.app
          for path in / /request /how-it-works /demo; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$base$path")
            echo "$path → $code"
            [ "$code" = "200" ] || { echo "route $path not 200"; exit 1; }
          done

  claim-regression:
    name: Live-claim regression (grant evidence)
    runs-on: ubuntu-latest
    needs: deploy-web
    if: ${{ inputs.run_claim_regression }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lumenia/web exec playwright install --with-deps chromium
      - name: Claim a fresh link end-to-end against the deployed URLs
        run: pnpm --filter @lumenia/web test:e2e -- claim.spec.ts
        env:
          USDC_ISSUER_SECRET: ${{ secrets.USDC_ISSUER_SECRET }}
